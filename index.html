<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreelanceFlow — Devis & Factures</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700&display=swap');

  :root {
    --ink: #0f0f0f;
    --paper: #f7f4ee;
    --cream: #ede9df;
    --gold: #c8953a;
    --gold-light: #e8b96a;
    --accent: #2d5a3d;
    --accent-light: #4a8c63;
    --red: #c0392b;
    --muted: #7a7469;
    --border: #d4cfc6;
    --shadow: 0 2px 20px rgba(15,15,15,0.08);
    --shadow-heavy: 0 8px 40px rgba(15,15,15,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    letter-spacing: -0.02em;
  }
  .logo span { color: var(--gold); }

  .header-actions { display: flex; gap: 0.75rem; }

  /* LAYOUT */
  .app { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 60px); }

  /* SIDEBAR */
  aside {
    background: var(--cream);
    border-right: 1px solid var(--border);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    overflow-y: auto;
  }

  .sidebar-section-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 1rem 0 0.5rem;
  }

  .sidebar-section-title:first-child { padding-top: 0; }

  .doc-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.6rem 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.875rem;
    border: 1px solid transparent;
    position: relative;
  }

  .doc-item:hover { background: var(--border); }
  .doc-item.active { background: var(--ink); color: var(--paper); }

  .doc-item .doc-type-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    font-weight: 500;
    padding: 2px 5px;
    border-radius: 3px;
    background: var(--gold);
    color: var(--ink);
    text-transform: uppercase;
  }

  .doc-item.active .doc-type-badge { background: var(--gold); color: var(--ink); }
  .doc-item .doc-badge-devis { background: #dce8e0; color: var(--accent); }
  .doc-item .doc-badge-facture { background: #fde8d0; color: #a05a20; }

  .doc-item .doc-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .doc-item .doc-amount { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); }
  .doc-item.active .doc-amount { color: var(--gold-light); }

  .doc-delete {
    opacity: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--red);
    font-size: 1rem;
    padding: 2px 4px;
    border-radius: 3px;
    transition: opacity 0.15s;
  }
  .doc-item:hover .doc-delete { opacity: 0.7; }
  .doc-delete:hover { opacity: 1 !important; }

  /* BTN */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    text-decoration: none;
    white-space: nowrap;
  }

  .btn-primary { background: var(--gold); color: var(--ink); }
  .btn-primary:hover { background: var(--gold-light); }

  .btn-dark { background: var(--ink); color: var(--paper); }
  .btn-dark:hover { background: #333; }

  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--ink); }
  .btn-outline:hover { border-color: var(--ink); background: var(--cream); }

  .btn-ghost { background: transparent; color: var(--muted); padding: 0.5rem 0.6rem; }
  .btn-ghost:hover { background: var(--border); color: var(--ink); }

  .btn-success { background: var(--accent); color: white; }
  .btn-success:hover { background: var(--accent-light); }

  .btn-danger { background: var(--red); color: white; }
  .btn-danger:hover { background: #e74c3c; }

  .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.8rem; }
  .btn-full { width: 100%; justify-content: center; }

  /* MAIN EDITOR */
  main {
    padding: 2rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    max-height: calc(100vh - 60px);
  }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 1rem;
    color: var(--muted);
    text-align: center;
    padding: 3rem;
  }

  .empty-icon {
    font-size: 3rem;
    opacity: 0.4;
  }

  .empty-state h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--ink);
  }

  /* CARD */
  .card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    box-shadow: var(--shadow);
  }

  .card-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  /* FORM GRID */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
  .form-full { grid-column: 1 / -1; }

  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
  .form-group label {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    padding: 0.55rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.875rem;
    background: var(--paper);
    color: var(--ink);
    transition: border-color 0.15s;
    outline: none;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--gold);
    background: white;
  }

  .form-group textarea { resize: vertical; min-height: 80px; }

  /* DOC HEADER */
  .doc-header-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .doc-number-display {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    line-height: 1;
  }

  .doc-type-selector {
    display: flex;
    gap: 0.5rem;
  }

  .type-toggle {
    padding: 0.4rem 1rem;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: none;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    transition: all 0.15s;
    color: var(--muted);
  }

  .type-toggle.active-devis { border-color: var(--accent); background: var(--accent); color: white; }
  .type-toggle.active-facture { border-color: var(--gold); background: var(--gold); color: var(--ink); }

  /* STATUS */
  .status-select {
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    border: none;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
  }

  .status-brouillon { background: #f0f0f0; color: #666; }
  .status-envoyé { background: #dce8e0; color: var(--accent); }
  .status-accepté { background: #d4edda; color: #1a7a35; }
  .status-refusé { background: #fde8e8; color: var(--red); }
  .status-payé { background: #fff3cd; color: #856404; }
  .status-en-retard { background: #f8d7da; color: var(--red); }

  /* PARTIES */
  .parties-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }

  .party-block {
    padding: 1rem;
    background: var(--paper);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .party-block h4 {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  /* LIGNES */
  .lines-table { width: 100%; border-collapse: collapse; }
  .lines-table th {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0.4rem 0.5rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  .lines-table td { padding: 0.4rem 0.5rem; vertical-align: middle; }

  .lines-table input {
    width: 100%;
    padding: 0.4rem 0.5rem;
    border: 1px solid transparent;
    border-radius: 4px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.875rem;
    background: transparent;
    color: var(--ink);
    transition: all 0.15s;
    outline: none;
  }

  .lines-table input:focus {
    border-color: var(--gold);
    background: white;
  }

  .lines-table tr:hover td input { border-color: var(--border); background: var(--paper); }

  .line-total {
    font-family: 'DM Mono', monospace;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--ink);
    text-align: right;
    padding-right: 0.5rem;
    white-space: nowrap;
  }

  .line-delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--border);
    font-size: 1rem;
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
    transition: all 0.15s;
  }

  .line-delete-btn:hover { color: var(--red); background: #fde8e8; }

  /* TOTAUX */
  .totals-block {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    max-width: 320px;
    margin-left: auto;
  }

  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.4rem 0;
    font-size: 0.875rem;
  }

  .total-row.separator { border-top: 1px solid var(--border); padding-top: 0.8rem; margin-top: 0.3rem; }

  .total-row.grand-total {
    font-size: 1.2rem;
    font-weight: 700;
    font-family: 'DM Serif Display', serif;
  }

  .total-label { color: var(--muted); }
  .total-value { font-family: 'DM Mono', monospace; font-weight: 500; }
  .grand-total .total-value { color: var(--gold); font-size: 1.4rem; }

  /* ACTIONS BAR */
  .actions-bar {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    padding: 1rem 1.5rem;
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow);
    position: sticky;
    bottom: 1rem;
  }

  .actions-spacer { flex: 1; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,15,15,0.6);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(4px);
  }

  .modal {
    background: white;
    border-radius: 12px;
    padding: 2rem;
    max-width: 480px;
    width: 100%;
    box-shadow: var(--shadow-heavy);
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    margin-bottom: 1.5rem;
  }

  .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }

  /* PRINT / PREVIEW */
  .preview-panel {
    position: fixed;
    inset: 0;
    background: rgba(15,15,15,0.85);
    z-index: 300;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem;
    overflow-y: auto;
    backdrop-filter: blur(6px);
  }

  .preview-container {
    max-width: 800px;
    width: 100%;
    position: relative;
  }

  .preview-controls {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1rem;
    justify-content: flex-end;
  }

  .preview-doc {
    background: white;
    padding: 3rem;
    border-radius: 8px;
    box-shadow: var(--shadow-heavy);
    font-family: 'Outfit', sans-serif;
    color: var(--ink);
  }

  .preview-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 3px solid var(--ink);
  }

  .preview-logo-block h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    line-height: 1;
  }

  .preview-logo-block h1 span { color: var(--gold); }

  .preview-logo-block p {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.5rem;
  }

  .preview-doc-type {
    text-align: right;
  }

  .preview-doc-type .type-label {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-style: italic;
    color: var(--muted);
  }

  .preview-doc-type .doc-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    color: var(--ink);
    font-weight: 500;
  }

  .preview-parties {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    margin-bottom: 2.5rem;
  }

  .preview-party h4 {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .preview-party .name { font-weight: 700; font-size: 1rem; }
  .preview-party p { font-size: 0.85rem; color: #444; line-height: 1.6; }

  .preview-meta {
    display: flex;
    gap: 2rem;
    background: var(--paper);
    padding: 1rem 1.5rem;
    border-radius: 8px;
    margin-bottom: 2rem;
    font-size: 0.85rem;
  }

  .preview-meta-item { display: flex; flex-direction: column; gap: 0.2rem; }
  .preview-meta-item .meta-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .preview-meta-item .meta-value { font-weight: 600; }

  .preview-table { width: 100%; border-collapse: collapse; margin-bottom: 2rem; }
  .preview-table thead tr { background: var(--ink); color: white; }
  .preview-table thead th { padding: 0.7rem 1rem; text-align: left; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; }
  .preview-table thead th:last-child { text-align: right; }
  .preview-table tbody tr { border-bottom: 1px solid var(--border); }
  .preview-table tbody tr:last-child { border-bottom: none; }
  .preview-table tbody td { padding: 0.7rem 1rem; font-size: 0.875rem; }
  .preview-table tbody td:last-child { text-align: right; font-family: 'DM Mono', monospace; font-weight: 500; }
  .preview-table tbody td:not(:first-child) { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--muted); }
  .preview-table tbody td:first-child { font-size: 0.875rem; color: var(--ink); font-family: 'Outfit', sans-serif; }

  .preview-totals { display: flex; justify-content: flex-end; margin-bottom: 2rem; }
  .preview-totals-inner { min-width: 280px; }
  .preview-total-row { display: flex; justify-content: space-between; padding: 0.4rem 0; font-size: 0.875rem; }
  .preview-total-row .lbl { color: var(--muted); }
  .preview-total-row .val { font-family: 'DM Mono', monospace; }
  .preview-total-row.final { border-top: 2px solid var(--ink); padding-top: 0.8rem; margin-top: 0.4rem; }
  .preview-total-row.final .lbl { font-weight: 700; font-size: 1rem; }
  .preview-total-row.final .val { font-weight: 700; font-size: 1.1rem; color: var(--gold); }

  .preview-notes { font-size: 0.8rem; color: var(--muted); line-height: 1.7; padding: 1rem 1.5rem; background: var(--paper); border-radius: 6px; margin-bottom: 2rem; }
  .preview-notes strong { color: var(--ink); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; font-family: 'DM Mono', monospace; display: block; margin-bottom: 0.4rem; }

  .preview-footer {
    border-top: 1px solid var(--border);
    padding-top: 1rem;
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--ink);
    color: var(--paper);
    padding: 0.8rem 1.2rem;
    border-radius: 8px;
    font-size: 0.875rem;
    z-index: 1000;
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
    box-shadow: var(--shadow-heavy);
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  @keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes toastOut { to { transform: translateY(20px); opacity: 0; } }

  /* BADGE COUNT */
  .count-badge {
    background: var(--gold);
    color: var(--ink);
    font-size: 0.6rem;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
  }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
  .stat-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem;
    box-shadow: var(--shadow);
  }
  .stat-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.5rem; }
  .stat-value { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--ink); }
  .stat-value.gold { color: var(--gold); }
  .stat-value.green { color: var(--accent); }

  @media print {
    header, aside, .actions-bar, .preview-controls { display: none !important; }
    .preview-panel { position: static; background: none; padding: 0; }
    .preview-doc { box-shadow: none; border-radius: 0; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Freelance<span>Flow</span></div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="showSettings()" style="color: #aaa;">⚙ Profil</button>
    <button class="btn btn-primary" onclick="newDocument()">+ Nouveau</button>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div id="stats-mini"></div>
    <div class="sidebar-section-title">Documents <span class="count-badge" id="doc-count">0</span></div>
    <div id="doc-list"></div>
  </aside>

  <!-- MAIN -->
  <main id="main-area">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">📄</div>
      <h2>Bienvenue sur FreelanceFlow</h2>
      <p style="max-width: 320px; line-height: 1.7;">Créez des devis et factures professionnels en quelques secondes. Tout est sauvegardé localement.</p>
      <div style="display:flex; gap:0.75rem; margin-top:0.5rem;">
        <button class="btn btn-primary" onclick="newDocument('devis')">📋 Nouveau devis</button>
        <button class="btn btn-outline" onclick="newDocument('facture')">🧾 Nouvelle facture</button>
      </div>
    </div>
    <div id="editor" style="display:none;"></div>
  </main>
</div>

<!-- MODAL PROFIL -->
<div class="modal-overlay" id="settings-modal" style="display:none;">
  <div class="modal">
    <h3>⚙ Votre profil</h3>
    <div class="form-grid">
      <div class="form-group form-full">
        <label>Nom / Entreprise</label>
        <input type="text" id="s-name" placeholder="Jean Dupont / Ma SASU">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="s-email" placeholder="jean@email.com">
      </div>
      <div class="form-group">
        <label>Téléphone</label>
        <input type="text" id="s-phone" placeholder="06 00 00 00 00">
      </div>
      <div class="form-group">
        <label>SIRET</label>
        <input type="text" id="s-siret" placeholder="123 456 789 00000">
      </div>
      <div class="form-group">
        <label>TVA Intracom.</label>
        <input type="text" id="s-tva" placeholder="FR 00 123456789">
      </div>
      <div class="form-group form-full">
        <label>Adresse</label>
        <textarea id="s-address" rows="3" placeholder="12 rue de la Paix&#10;75001 Paris"></textarea>
      </div>
      <div class="form-group form-full">
        <label>IBAN (pour les factures)</label>
        <input type="text" id="s-iban" placeholder="FR76 0000 0000 0000 0000 0000 000">
      </div>
      <div class="form-group">
        <label>Préfixe devis</label>
        <input type="text" id="s-prefix-devis" placeholder="DEV" maxlength="5">
      </div>
      <div class="form-group">
        <label>Préfixe facture</label>
        <input type="text" id="s-prefix-facture" placeholder="FAC" maxlength="5">
      </div>
      <div class="form-group">
        <label>TVA par défaut (%)</label>
        <input type="number" id="s-tva-rate" placeholder="20" min="0" max="100">
      </div>
      <div class="form-group">
        <label>Délai paiement (jours)</label>
        <input type="number" id="s-payment-delay" placeholder="30" min="0">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeSettings()">Annuler</button>
      <button class="btn btn-primary" onclick="saveSettings()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<!-- PREVIEW PANEL -->
<div class="preview-panel" id="preview-panel" style="display:none;">
  <div class="preview-container">
    <div class="preview-controls">
      <button class="btn btn-outline" style="background:white;" onclick="closePreview()">✕ Fermer</button>
      <button class="btn btn-dark" onclick="window.print()">🖨 Imprimer</button>
      <button class="btn btn-primary" onclick="exportPDF()">⬇ Exporter PDF</button>
    </div>
    <div class="preview-doc" id="preview-content"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let state = {
  docs: [],
  currentId: null,
  settings: {
    name: '',
    email: '',
    phone: '',
    siret: '',
    tva: '',
    address: '',
    iban: '',
    prefixDevis: 'DEV',
    prefixFacture: 'FAC',
    tvaRate: 20,
    paymentDelay: 30
  }
};

// ═══════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════
function save() {
  localStorage.setItem('freelanceflow', JSON.stringify(state));
}

function load() {
  const raw = localStorage.getItem('freelanceflow');
  if (raw) {
    try { state = JSON.parse(raw); } catch(e) {}
  }
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function fmt(n) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(n || 0);
}

function today() {
  return new Date().toISOString().split('T')[0];
}

function addDays(dateStr, days) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });
}

function nextNum(type) {
  const prefix = type === 'devis' ? state.settings.prefixDevis || 'DEV' : state.settings.prefixFacture || 'FAC';
  const year = new Date().getFullYear();
  const existing = state.docs.filter(d => d.type === type).length;
  const num = String(existing + 1).padStart(3, '0');
  return `${prefix}-${year}-${num}`;
}

function calcLine(line) {
  return (parseFloat(line.qty) || 0) * (parseFloat(line.pu) || 0);
}

function calcTotals(doc) {
  const ht = doc.lines.reduce((sum, l) => sum + calcLine(l), 0);
  const tvaRate = parseFloat(doc.tvaRate) || 0;
  const tvaAmt = ht * tvaRate / 100;
  const ttc = ht + tvaAmt;
  return { ht, tvaRate, tvaAmt, ttc };
}

function toast(msg, icon = '✓') {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ═══════════════════════════════════════════════
// DOCUMENTS
// ═══════════════════════════════════════════════
function newDocument(type = 'devis') {
  const doc = {
    id: uid(),
    type,
    num: nextNum(type),
    status: 'brouillon',
    dateCreation: today(),
    dateEcheance: addDays(today(), type === 'facture' ? state.settings.paymentDelay || 30 : 30),
    client: { name: '', email: '', phone: '', address: '', siret: '' },
    object: '',
    lines: [{ id: uid(), desc: '', qty: 1, unit: 'heure', pu: 0 }],
    tvaRate: state.settings.tvaRate || 20,
    notes: type === 'facture'
      ? `Paiement par virement bancaire.\nIBAN : ${state.settings.iban || 'à compléter'}\nTout retard de paiement entraîne des pénalités de retard.`
      : 'Devis valable 30 jours à compter de la date d\'émission.',
    createdAt: Date.now()
  };
  state.docs.unshift(doc);
  state.currentId = doc.id;
  save();
  renderAll();

  if (!state.settings.name) {
    setTimeout(() => { showSettings(); toast('Renseignez votre profil pour personnaliser vos documents', '👤'); }, 300);
  }
}

function deleteDoc(id) {
  if (!confirm('Supprimer ce document ?')) return;
  state.docs = state.docs.filter(d => d.id !== id);
  if (state.currentId === id) {
    state.currentId = state.docs.length ? state.docs[0].id : null;
  }
  save();
  renderAll();
  toast('Document supprimé', '🗑');
}

function getDoc(id) { return state.docs.find(d => d.id === id); }
function currentDoc() { return getDoc(state.currentId); }

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function renderAll() {
  renderSidebar();
  renderEditor();
}

function renderSidebar() {
  const list = document.getElementById('doc-list');
  const count = document.getElementById('doc-count');
  count.textContent = state.docs.length;

  // Mini stats
  const paye = state.docs.filter(d => d.status === 'payé');
  const total = paye.reduce((s, d) => s + calcTotals(d).ttc, 0);
  const pending = state.docs.filter(d => d.type === 'facture' && !['payé','refusé'].includes(d.status));
  const pendingAmt = pending.reduce((s, d) => s + calcTotals(d).ttc, 0);

  document.getElementById('stats-mini').innerHTML = `
    <div style="background: var(--ink); color: var(--paper); border-radius: 8px; padding: 1rem; margin-bottom: 0.5rem;">
      <div style="font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; color:#aaa; margin-bottom:0.3rem;">Encaissé</div>
      <div style="font-family:'DM Serif Display',serif; font-size:1.4rem; color:var(--gold);">${fmt(total)}</div>
      <div style="font-family:'DM Mono',monospace; font-size:0.65rem; color:#888; margin-top:0.3rem;">En attente: ${fmt(pendingAmt)}</div>
    </div>
  `;

  if (!state.docs.length) {
    list.innerHTML = '<div style="font-size:0.8rem; color:var(--muted); text-align:center; padding: 1rem 0;">Aucun document</div>';
    return;
  }

  list.innerHTML = state.docs.map(doc => {
    const totals = calcTotals(doc);
    const isActive = doc.id === state.currentId;
    const badgeClass = doc.type === 'devis' ? 'doc-badge-devis' : 'doc-badge-facture';
    return `
      <div class="doc-item ${isActive ? 'active' : ''}" onclick="selectDoc('${doc.id}')">
        <span class="doc-type-badge ${badgeClass}">${doc.type === 'devis' ? 'DEV' : 'FAC'}</span>
        <div style="flex:1; overflow:hidden;">
          <div class="doc-name" style="font-size:0.8rem; font-weight:600;">${doc.num}</div>
          <div style="font-size:0.72rem; opacity:0.7; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${doc.client.name || 'Client non renseigné'}</div>
        </div>
        <div class="doc-amount">${fmt(totals.ttc)}</div>
        <button class="doc-delete" onclick="event.stopPropagation();deleteDoc('${doc.id}')">✕</button>
      </div>
    `;
  }).join('');
}

function renderEditor() {
  const empty = document.getElementById('empty-state');
  const editor = document.getElementById('editor');

  if (!state.currentId || !currentDoc()) {
    empty.style.display = 'flex';
    editor.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  editor.style.display = 'flex';
  editor.style.flexDirection = 'column';
  editor.style.gap = '1.5rem';

  const doc = currentDoc();
  const totals = calcTotals(doc);

  editor.innerHTML = `
    <!-- DOC HEADER -->
    <div class="card">
      <div class="doc-header-bar">
        <div>
          <div class="doc-type-selector">
            <button class="type-toggle ${doc.type === 'devis' ? 'active-devis' : ''}" onclick="setType('devis')">📋 Devis</button>
            <button class="type-toggle ${doc.type === 'facture' ? 'active-facture' : ''}" onclick="setType('facture')">🧾 Facture</button>
          </div>
          <div class="doc-number-display" style="margin-top:0.5rem;">${doc.num}</div>
        </div>
        <div style="text-align:right; display:flex; flex-direction:column; align-items:flex-end; gap:0.5rem;">
          <select class="status-select status-${doc.status.replace(' ','-')}" onchange="setStatus(this.value)">
            <option value="brouillon" ${doc.status==='brouillon'?'selected':''}>✏ Brouillon</option>
            <option value="envoyé" ${doc.status==='envoyé'?'selected':''}>📤 Envoyé</option>
            <option value="accepté" ${doc.status==='accepté'?'selected':''}>✅ Accepté</option>
            <option value="refusé" ${doc.status==='refusé'?'selected':''}>❌ Refusé</option>
            ${doc.type === 'facture' ? `
            <option value="payé" ${doc.status==='payé'?'selected':''}>💰 Payé</option>
            <option value="en-retard" ${doc.status==='en-retard'?'selected':''}>⏰ En retard</option>
            ` : ''}
          </select>
          <div style="font-size:0.75rem; color:var(--muted);">Grand total : <span style="font-family:'DM Mono',monospace; font-weight:600; color:var(--gold);">${fmt(totals.ttc)}</span></div>
        </div>
      </div>
    </div>

    <!-- DATES & OBJET -->
    <div class="card">
      <div class="card-title">Informations</div>
      <div class="form-grid-3">
        <div class="form-group">
          <label>Date d'émission</label>
          <input type="date" value="${doc.dateCreation}" onchange="updateField('dateCreation', this.value)">
        </div>
        <div class="form-group">
          <label>${doc.type === 'facture' ? 'Date d\'échéance' : 'Date de validité'}</label>
          <input type="date" value="${doc.dateEcheance}" onchange="updateField('dateEcheance', this.value)">
        </div>
        <div class="form-group">
          <label>Objet / Mission</label>
          <input type="text" value="${doc.object}" placeholder="Ex: Développement site web" onchange="updateField('object', this.value)">
        </div>
      </div>
    </div>

    <!-- PARTIES -->
    <div class="card">
      <div class="card-title">Parties</div>
      <div class="parties-grid">
        <div class="party-block">
          <h4>📤 Émetteur (vous)</h4>
          <div style="font-size:0.85rem; color:${state.settings.name ? 'var(--ink)' : 'var(--muted)'}; line-height:1.8;">
            ${state.settings.name
              ? `<strong>${state.settings.name}</strong><br>${state.settings.address?.replace(/\n/g,'<br>') || ''}<br>${state.settings.email || ''} ${state.settings.phone ? '· ' + state.settings.phone : ''}<br>${state.settings.siret ? 'SIRET: ' + state.settings.siret : ''}`
              : 'Non renseigné — <a href="#" onclick="showSettings()" style="color:var(--gold)">Configurer le profil</a>'
            }
          </div>
        </div>
        <div class="party-block">
          <h4>📥 Client</h4>
          <div class="form-grid" style="gap:0.6rem;">
            <div class="form-group form-full">
              <label>Nom / Société</label>
              <input type="text" value="${doc.client.name}" placeholder="Nom du client" oninput="updateClient('name', this.value)">
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" value="${doc.client.email}" placeholder="client@email.com" oninput="updateClient('email', this.value)">
            </div>
            <div class="form-group">
              <label>Téléphone</label>
              <input type="text" value="${doc.client.phone}" placeholder="06 ..." oninput="updateClient('phone', this.value)">
            </div>
            <div class="form-group form-full">
              <label>Adresse</label>
              <textarea rows="2" placeholder="12 rue..." oninput="updateClient('address', this.value)">${doc.client.address}</textarea>
            </div>
            <div class="form-group form-full">
              <label>SIRET</label>
              <input type="text" value="${doc.client.siret}" placeholder="SIRET (optionnel)" oninput="updateClient('siret', this.value)">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- LIGNES -->
    <div class="card">
      <div class="card-title">Prestations</div>
      <div style="overflow-x:auto;">
        <table class="lines-table">
          <thead>
            <tr>
              <th style="width:40%">Description</th>
              <th style="width:10%">Qté</th>
              <th style="width:12%">Unité</th>
              <th style="width:14%">PU HT (€)</th>
              <th style="width:16%; text-align:right;">Total HT</th>
              <th style="width:8%;"></th>
            </tr>
          </thead>
          <tbody id="lines-body">
            ${doc.lines.map((l, i) => renderLine(l, i)).join('')}
          </tbody>
        </table>
      </div>
      <div style="margin-top:1rem; display:flex; gap:0.75rem; align-items:center;">
        <button class="btn btn-outline btn-sm" onclick="addLine()">+ Ajouter une ligne</button>
        <button class="btn btn-ghost btn-sm" onclick="addLineBlank()">+ Séparateur</button>
        <div style="flex:1;"></div>
        <div class="form-group" style="flex-direction:row; align-items:center; gap:0.5rem; margin:0;">
          <label style="margin:0; white-space:nowrap;">TVA (%)</label>
          <input type="number" value="${doc.tvaRate}" min="0" max="100" style="width:70px; padding:0.4rem 0.5rem; border:1px solid var(--border); border-radius:6px; font-family:'Outfit',sans-serif; font-size:0.875rem; background:var(--paper);" onchange="updateField('tvaRate', parseFloat(this.value) || 0); renderEditor();">
        </div>
      </div>

      <!-- TOTAUX -->
      <div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--border);">
        <div class="totals-block">
          <div class="total-row">
            <span class="total-label">Sous-total HT</span>
            <span class="total-value">${fmt(totals.ht)}</span>
          </div>
          <div class="total-row">
            <span class="total-label">TVA ${totals.tvaRate}%</span>
            <span class="total-value">${fmt(totals.tvaAmt)}</span>
          </div>
          <div class="total-row separator grand-total">
            <span class="total-label">Total TTC</span>
            <span class="total-value">${fmt(totals.ttc)}</span>
          </div>
          ${totals.tvaRate === 0 ? '<div style="font-size:0.72rem; color:var(--muted); text-align:right;">TVA non applicable, art. 293 B du CGI</div>' : ''}
        </div>
      </div>
    </div>

    <!-- NOTES -->
    <div class="card">
      <div class="card-title">Notes & conditions</div>
      <div class="form-group">
        <textarea rows="4" style="font-size:0.875rem;" oninput="updateField('notes', this.value)">${doc.notes}</textarea>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions-bar">
      <button class="btn btn-outline" onclick="duplicateDoc()">📋 Dupliquer</button>
      ${doc.type === 'devis' ? `<button class="btn btn-outline" onclick="convertToFacture()">🧾 Convertir en facture</button>` : ''}
      <div class="actions-spacer"></div>
      <button class="btn btn-outline btn-sm" onclick="saveManual()" style="color:var(--accent);">💾 Sauvegarder</button>
      <button class="btn btn-success" onclick="openPreview()">👁 Aperçu / Exporter</button>
    </div>
  `;
}

function renderLine(l, i) {
  const total = calcLine(l);
  if (l.separator) {
    return `
      <tr>
        <td colspan="5">
          <input type="text" value="${l.desc}" placeholder="— Titre de section —" style="font-weight:600; font-size:0.8rem; border:none !important; background:transparent !important;" oninput="updateLine('${l.id}', 'desc', this.value)">
        </td>
        <td><button class="line-delete-btn" onclick="deleteLine('${l.id}')">✕</button></td>
      </tr>
    `;
  }
  return `
    <tr>
      <td><input type="text" value="${l.desc}" placeholder="Description de la prestation" oninput="updateLine('${l.id}', 'desc', this.value)"></td>
      <td><input type="number" value="${l.qty}" min="0" step="0.5" style="text-align:center;" oninput="updateLine('${l.id}', 'qty', parseFloat(this.value)||0)"></td>
      <td>
        <select style="width:100%; padding:0.4rem 0.3rem; border:1px solid transparent; border-radius:4px; font-family:'Outfit',sans-serif; font-size:0.8rem; background:transparent; cursor:pointer;" onchange="updateLine('${l.id}', 'unit', this.value)">
          ${['heure','jour','forfait','unité','mois','semaine','km'].map(u => `<option value="${u}" ${l.unit===u?'selected':''}>${u}</option>`).join('')}
        </select>
      </td>
      <td><input type="number" value="${l.pu}" min="0" step="0.01" style="text-align:right;" oninput="updateLine('${l.id}', 'pu', parseFloat(this.value)||0)"></td>
      <td class="line-total">${fmt(total)}</td>
      <td><button class="line-delete-btn" onclick="deleteLine('${l.id}')">✕</button></td>
    </tr>
  `;
}

// ═══════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════
function selectDoc(id) {
  state.currentId = id;
  renderAll();
}

function setType(type) {
  const doc = currentDoc();
  if (!doc) return;
  doc.type = type;
  doc.num = nextNum(type);
  save();
  renderAll();
}

function setStatus(status) {
  const doc = currentDoc();
  if (!doc) return;
  doc.status = status;
  save();
  renderSidebar();
  toast(`Statut mis à jour : ${status}`);
}

function updateField(field, value) {
  const doc = currentDoc();
  if (!doc) return;
  doc[field] = value;
  save();
}

function updateClient(field, value) {
  const doc = currentDoc();
  if (!doc) return;
  doc.client[field] = value;
  save();
}

function addLine() {
  const doc = currentDoc();
  if (!doc) return;
  doc.lines.push({ id: uid(), desc: '', qty: 1, unit: 'heure', pu: 0 });
  save();
  renderEditor();
  setTimeout(() => {
    const tbody = document.getElementById('lines-body');
    if (tbody) {
      const inputs = tbody.querySelectorAll('input[type="text"]');
      if (inputs.length) inputs[inputs.length - 1].focus();
    }
  }, 50);
}

function addLineBlank() {
  const doc = currentDoc();
  if (!doc) return;
  doc.lines.push({ id: uid(), desc: '', separator: true });
  save();
  renderEditor();
}

function deleteLine(id) {
  const doc = currentDoc();
  if (!doc) return;
  if (doc.lines.length <= 1) { toast('Au moins une ligne requise', '⚠'); return; }
  doc.lines = doc.lines.filter(l => l.id !== id);
  save();
  renderEditor();
}

function updateLine(id, field, value) {
  const doc = currentDoc();
  if (!doc) return;
  const line = doc.lines.find(l => l.id === id);
  if (!line) return;
  line[field] = value;
  save();
  // Update total display without full re-render
  const total = calcLine(line);
  const cells = document.querySelectorAll('.line-total');
  const idx = doc.lines.indexOf(line);
  if (cells[idx]) cells[idx].textContent = fmt(total);
  // Update grand totals
  const totals = calcTotals(doc);
  // Quick totals update
  const totalRows = document.querySelectorAll('.total-value');
  if (totalRows.length >= 3) {
    totalRows[0].textContent = fmt(totals.ht);
    totalRows[1].textContent = fmt(totals.tvaAmt);
    totalRows[2].textContent = fmt(totals.ttc);
  }
}

function duplicateDoc() {
  const doc = currentDoc();
  if (!doc) return;
  const copy = JSON.parse(JSON.stringify(doc));
  copy.id = uid();
  copy.num = nextNum(copy.type);
  copy.status = 'brouillon';
  copy.dateCreation = today();
  copy.createdAt = Date.now();
  state.docs.unshift(copy);
  state.currentId = copy.id;
  save();
  renderAll();
  toast('Document dupliqué ✓');
}

function convertToFacture() {
  const doc = currentDoc();
  if (!doc || doc.type !== 'devis') return;
  const copy = JSON.parse(JSON.stringify(doc));
  copy.id = uid();
  copy.type = 'facture';
  copy.num = nextNum('facture');
  copy.status = 'brouillon';
  copy.dateCreation = today();
  copy.dateEcheance = addDays(today(), state.settings.paymentDelay || 30);
  copy.notes = `Paiement par virement bancaire.\nIBAN : ${state.settings.iban || 'à compléter'}\nRéférence devis : ${doc.num}`;
  copy.createdAt = Date.now();
  state.docs.unshift(copy);
  state.currentId = copy.id;
  save();
  renderAll();
  toast('Converti en facture ✓', '🧾');
}

function saveManual() {
  save();
  toast('Sauvegardé ✓', '💾');
}

// ═══════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════
function showSettings() {
  const s = state.settings;
  document.getElementById('s-name').value = s.name || '';
  document.getElementById('s-email').value = s.email || '';
  document.getElementById('s-phone').value = s.phone || '';
  document.getElementById('s-siret').value = s.siret || '';
  document.getElementById('s-tva').value = s.tva || '';
  document.getElementById('s-address').value = s.address || '';
  document.getElementById('s-iban').value = s.iban || '';
  document.getElementById('s-prefix-devis').value = s.prefixDevis || 'DEV';
  document.getElementById('s-prefix-facture').value = s.prefixFacture || 'FAC';
  document.getElementById('s-tva-rate').value = s.tvaRate || 20;
  document.getElementById('s-payment-delay').value = s.paymentDelay || 30;
  document.getElementById('settings-modal').style.display = 'flex';
}

function closeSettings() {
  document.getElementById('settings-modal').style.display = 'none';
}

function saveSettings() {
  state.settings = {
    name: document.getElementById('s-name').value,
    email: document.getElementById('s-email').value,
    phone: document.getElementById('s-phone').value,
    siret: document.getElementById('s-siret').value,
    tva: document.getElementById('s-tva').value,
    address: document.getElementById('s-address').value,
    iban: document.getElementById('s-iban').value,
    prefixDevis: document.getElementById('s-prefix-devis').value || 'DEV',
    prefixFacture: document.getElementById('s-prefix-facture').value || 'FAC',
    tvaRate: parseFloat(document.getElementById('s-tva-rate').value) || 20,
    paymentDelay: parseInt(document.getElementById('s-payment-delay').value) || 30,
  };
  save();
  closeSettings();
  renderEditor();
  toast('Profil sauvegardé ✓', '👤');
}

// ═══════════════════════════════════════════════
// PREVIEW
// ═══════════════════════════════════════════════
function openPreview() {
  const doc = currentDoc();
  if (!doc) return;
  const totals = calcTotals(doc);
  const s = state.settings;

  const linesHtml = doc.lines.map(l => {
    if (l.separator) return `<tr><td colspan="5" style="padding:0.5rem 1rem; font-weight:700; font-size:0.8rem; background:#f9f9f9; color:#666;">${l.desc || '—'}</td></tr>`;
    return `
      <tr>
        <td>${l.desc || '—'}</td>
        <td>${l.qty} ${l.unit}</td>
        <td>${fmt(parseFloat(l.pu)||0)}</td>
        <td>${fmt(calcLine(l))}</td>
      </tr>
    `;
  }).join('');

  document.getElementById('preview-content').innerHTML = `
    <div class="preview-header">
      <div class="preview-logo-block">
        <h1>Freelance<span>Flow</span></h1>
        ${s.name ? `<p style="font-weight:700; font-size:1rem; color:#333; margin-top:0.3rem;">${s.name}</p>` : ''}
        ${s.address ? `<p>${s.address.replace(/\n/g,'<br>')}</p>` : ''}
        ${s.email ? `<p>${s.email}${s.phone ? ' · ' + s.phone : ''}</p>` : ''}
        ${s.siret ? `<p>SIRET: ${s.siret}</p>` : ''}
        ${s.tva ? `<p>TVA: ${s.tva}</p>` : ''}
      </div>
      <div class="preview-doc-type">
        <div class="type-label">${doc.type === 'devis' ? 'Devis' : 'Facture'}</div>
        <div class="doc-num">${doc.num}</div>
      </div>
    </div>

    <div class="preview-parties">
      <div class="preview-party">
        <h4>Émetteur</h4>
        ${s.name ? `<p class="name">${s.name}</p>` : '<p style="color:#aaa">Non renseigné</p>'}
        ${s.address ? `<p>${s.address.replace(/\n/g,'<br>')}</p>` : ''}
      </div>
      <div class="preview-party">
        <h4>Destinataire</h4>
        ${doc.client.name ? `<p class="name">${doc.client.name}</p>` : '<p style="color:#aaa">Non renseigné</p>'}
        ${doc.client.address ? `<p>${doc.client.address.replace(/\n/g,'<br>')}</p>` : ''}
        ${doc.client.email ? `<p>${doc.client.email}${doc.client.phone ? ' · ' + doc.client.phone : ''}</p>` : ''}
        ${doc.client.siret ? `<p>SIRET: ${doc.client.siret}</p>` : ''}
      </div>
    </div>

    <div class="preview-meta">
      <div class="preview-meta-item">
        <span class="meta-label">Date d'émission</span>
        <span class="meta-value">${formatDate(doc.dateCreation)}</span>
      </div>
      <div class="preview-meta-item">
        <span class="meta-label">${doc.type === 'facture' ? 'Échéance' : 'Validité'}</span>
        <span class="meta-value">${formatDate(doc.dateEcheance)}</span>
      </div>
      ${doc.object ? `<div class="preview-meta-item"><span class="meta-label">Objet</span><span class="meta-value">${doc.object}</span></div>` : ''}
      <div class="preview-meta-item">
        <span class="meta-label">Statut</span>
        <span class="meta-value" style="text-transform:capitalize;">${doc.status}</span>
      </div>
    </div>

    <table class="preview-table">
      <thead>
        <tr>
          <th style="width:50%;">Description</th>
          <th>Quantité</th>
          <th>Prix unitaire</th>
          <th style="text-align:right;">Total HT</th>
        </tr>
      </thead>
      <tbody>
        ${linesHtml}
      </tbody>
    </table>

    <div class="preview-totals">
      <div class="preview-totals-inner">
        <div class="preview-total-row">
          <span class="lbl">Sous-total HT</span>
          <span class="val">${fmt(totals.ht)}</span>
        </div>
        <div class="preview-total-row">
          <span class="lbl">TVA ${totals.tvaRate}%</span>
          <span class="val">${fmt(totals.tvaAmt)}</span>
        </div>
        <div class="preview-total-row final">
          <span class="lbl">Total TTC</span>
          <span class="val">${fmt(totals.ttc)}</span>
        </div>
        ${totals.tvaRate === 0 ? '<div style="font-size:0.7rem; color:#aaa; text-align:right; margin-top:0.3rem;">TVA non applicable, art. 293 B du CGI</div>' : ''}
      </div>
    </div>

    ${doc.notes ? `
    <div class="preview-notes">
      <strong>Notes & conditions</strong>
      ${doc.notes.replace(/\n/g,'<br>')}
    </div>` : ''}

    <div class="preview-footer">
      ${s.name || 'FreelanceFlow'} ${s.siret ? '· SIRET ' + s.siret : ''} ${s.tva ? '· TVA ' + s.tva : ''}
    </div>
  `;

  document.getElementById('preview-panel').style.display = 'flex';
}

function closePreview() {
  document.getElementById('preview-panel').style.display = 'none';
}

function exportPDF() {
  toast('Utilise Ctrl+P → Enregistrer en PDF pour exporter', '🖨');
  setTimeout(() => window.print(), 500);
}

// ═══════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveManual(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'p') { e.preventDefault(); openPreview(); }
  if (e.key === 'Escape') { closePreview(); closeSettings(); }
});

// ═══════════════════════════════════════════════

// ═══════════════════════════════════════════════
load();
renderAll();
