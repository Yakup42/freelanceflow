<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreelanceFlow — Devis & Factures en ligne</title>

<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700&display=swap');

:root {
  --ink: #0f0f0f;
  --paper: #f7f4ee;
  --cream: #ede9df;
  --gold: #c8953a;
  --gold-light: #e8b96a;
  --accent: #2d5a3d;
  --accent-light: #4a8c63;
  --red: #c0392b;
  --muted: #7a7469;
  --border: #d4cfc6;
  --shadow: 0 2px 20px rgba(15,15,15,0.08);
  --shadow-heavy: 0 8px 40px rgba(15,15,15,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

/* ── AUTH SCREEN ── */
#auth-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--ink);
  padding: 1rem;
}

.auth-card {
  background: var(--paper);
  border-radius: 16px;
  padding: 2.5rem;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow-heavy);
  animation: slideUp 0.3s ease;
}

@keyframes slideUp { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }

.auth-logo {
  font-family: 'DM Serif Display', serif;
  font-size: 2rem;
  margin-bottom: 0.3rem;
  line-height: 1;
}
.auth-logo span { color: var(--gold); }
.auth-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }

.auth-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
.auth-tab {
  flex: 1; padding: 0.6rem; text-align: center; cursor: pointer;
  font-size: 0.85rem; font-weight: 600; transition: all 0.15s; border: none;
  font-family: 'Outfit', sans-serif; background: var(--cream); color: var(--muted);
}
.auth-tab.active { background: var(--ink); color: var(--paper); }

.form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
.form-group label { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.form-group input {
  padding: 0.65rem 0.85rem;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  background: white;
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s;
}
.form-group input:focus { border-color: var(--gold); }

.auth-error {
  background: #fde8e8; color: var(--red);
  padding: 0.7rem 1rem; border-radius: 6px;
  font-size: 0.8rem; margin-bottom: 1rem; display: none;
}

.auth-info {
  background: #dce8e0; color: var(--accent);
  padding: 0.7rem 1rem; border-radius: 6px;
  font-size: 0.8rem; margin-bottom: 1rem; display: none;
}

/* ── APP SHELL ── */
#app-screen { display: none; }

header {
  background: var(--ink);
  color: var(--paper);
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 58px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo { font-family: 'DM Serif Display', serif; font-size: 1.35rem; letter-spacing: -0.02em; }
.logo span { color: var(--gold); }

.header-right { display: flex; align-items: center; gap: 0.75rem; }
.user-chip {
  font-size: 0.75rem; color: #aaa;
  font-family: 'DM Mono', monospace;
  max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sync-indicator {
  width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
  transition: background 0.3s;
}
.sync-indicator.syncing { background: var(--gold); animation: pulse 1s infinite; }
.sync-indicator.error { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.app { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 58px); }

/* SIDEBAR */
aside {
  background: var(--cream);
  border-right: 1px solid var(--border);
  padding: 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  overflow-y: auto;
  max-height: calc(100vh - 58px);
}

.sidebar-section-title {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0.75rem 0 0.4rem;
}

.doc-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.55rem 0.7rem;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 0.85rem;
  border: 1px solid transparent;
}
.doc-item:hover { background: var(--border); }
.doc-item.active { background: var(--ink); color: var(--paper); }

.doc-type-badge {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  font-weight: 500;
  padding: 2px 5px;
  border-radius: 3px;
  text-transform: uppercase;
  flex-shrink: 0;
}
.badge-devis { background: #dce8e0; color: var(--accent); }
.badge-facture { background: #fde8d0; color: #a05a20; }
.doc-item.active .doc-type-badge { background: rgba(200,149,58,0.3); color: var(--gold-light); }

.doc-meta { flex: 1; overflow: hidden; }
.doc-meta-num { font-size: 0.78rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.doc-meta-client { font-size: 0.7rem; opacity: 0.65; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.doc-amount { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); flex-shrink: 0; }
.doc-item.active .doc-amount { color: var(--gold-light); }

.doc-delete { opacity:0; background:none; border:none; cursor:pointer; color:var(--red); font-size:0.9rem; padding:2px 4px; border-radius:3px; transition:opacity 0.15s; flex-shrink:0; }
.doc-item:hover .doc-delete { opacity:0.6; }
.doc-delete:hover { opacity:1 !important; background:#fde8e8; }

/* BTN */
.btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.5rem 1rem; border-radius: 6px;
  font-family: 'Outfit', sans-serif; font-size: 0.875rem; font-weight: 500;
  cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--gold); color: var(--ink); }
.btn-primary:hover:not(:disabled) { background: var(--gold-light); }
.btn-dark { background: var(--ink); color: var(--paper); }
.btn-dark:hover:not(:disabled) { background: #333; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--ink); }
.btn-outline:hover:not(:disabled) { border-color: var(--ink); }
.btn-ghost { background: transparent; color: var(--muted); padding: 0.5rem 0.6rem; }
.btn-ghost:hover { background: var(--border); color: var(--ink); }
.btn-success { background: var(--accent); color: white; }
.btn-success:hover:not(:disabled) { background: var(--accent-light); }
.btn-danger { background: var(--red); color: white; }
.btn-sm { padding: 0.35rem 0.7rem; font-size: 0.8rem; }
.btn-full { width: 100%; justify-content: center; }

/* MAIN */
main {
  padding: 1.75rem;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
  max-height: calc(100vh - 58px);
}

.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; gap: 1rem;
  color: var(--muted); text-align: center; padding: 3rem;
}
.empty-state h2 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--ink); }

/* CARD */
.card {
  background: white; border: 1px solid var(--border);
  border-radius: 10px; padding: 1.4rem; box-shadow: var(--shadow);
}
.card-title {
  font-family: 'DM Mono', monospace; font-size: 0.6rem; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.9rem;
}

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.9rem; }
.form-full { grid-column: 1 / -1; }

.form-group label { font-size: 0.7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.form-group input, .form-group select, .form-group textarea {
  padding: 0.5rem 0.7rem; border: 1px solid var(--border); border-radius: 6px;
  font-family: 'Outfit', sans-serif; font-size: 0.875rem; background: var(--paper); color: var(--ink);
  transition: border-color 0.15s; outline: none;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--gold); background: white;
}
.form-group textarea { resize: vertical; min-height: 70px; }

.doc-header-bar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
.doc-number-display { font-family: 'DM Serif Display', serif; font-size: 1.8rem; line-height: 1; margin-top: 0.4rem; }

.type-toggle {
  padding: 0.35rem 0.9rem; border-radius: 20px; border: 1.5px solid var(--border);
  background: none; cursor: pointer; font-family: 'Outfit', sans-serif;
  font-size: 0.8rem; font-weight: 600; transition: all 0.15s; color: var(--muted);
}
.type-toggle.active-devis { border-color: var(--accent); background: var(--accent); color: white; }
.type-toggle.active-facture { border-color: var(--gold); background: var(--gold); color: var(--ink); }

.status-select {
  padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.75rem;
  font-weight: 600; border: none; cursor: pointer; font-family: 'Outfit', sans-serif;
  outline: none;
}
.status-brouillon { background:#f0f0f0; color:#666; }
.status-envoyé { background:#dce8e0; color:var(--accent); }
.status-accepté { background:#d4edda; color:#1a7a35; }
.status-refusé { background:#fde8e8; color:var(--red); }
.status-payé { background:#fff3cd; color:#856404; }
.status-en-retard { background:#f8d7da; color:var(--red); }

.parties-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
.party-block { padding: 1rem; background: var(--paper); border-radius: 8px; border: 1px solid var(--border); }
.party-block h4 { font-family: 'DM Mono', monospace; font-size: 0.6rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.65rem; }

.lines-table { width: 100%; border-collapse: collapse; }
.lines-table th {
  font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); padding: 0.4rem 0.5rem;
  text-align: left; border-bottom: 1px solid var(--border);
}
.lines-table td { padding: 0.35rem 0.4rem; vertical-align: middle; }
.lines-table input {
  width: 100%; padding: 0.35rem 0.45rem; border: 1px solid transparent;
  border-radius: 4px; font-family: 'Outfit', sans-serif; font-size: 0.85rem;
  background: transparent; color: var(--ink); transition: all 0.15s; outline: none;
}
.lines-table input:focus { border-color: var(--gold); background: white; }
.lines-table tr:hover td input { border-color: var(--border); background: var(--paper); }
.line-total { font-family: 'DM Mono', monospace; font-size: 0.85rem; font-weight: 500; text-align: right; padding-right: 0.5rem; white-space: nowrap; }
.line-delete-btn { background:none; border:none; cursor:pointer; color:var(--border); font-size:0.9rem; padding:0.2rem 0.4rem; border-radius:4px; transition:all 0.15s; }
.line-delete-btn:hover { color:var(--red); background:#fde8e8; }

.totals-block { display: flex; flex-direction: column; gap: 0.4rem; max-width: 300px; margin-left: auto; }
.total-row { display: flex; justify-content: space-between; align-items: center; padding: 0.35rem 0; font-size: 0.875rem; }
.total-row.separator { border-top: 1px solid var(--border); padding-top: 0.7rem; margin-top: 0.2rem; }
.total-row.grand-total { font-size: 1.15rem; font-weight: 700; font-family: 'DM Serif Display', serif; }
.total-label { color: var(--muted); }
.total-value { font-family: 'DM Mono', monospace; font-weight: 500; }
.grand-total .total-value { color: var(--gold); font-size: 1.3rem; }

.actions-bar {
  display: flex; gap: 0.65rem; align-items: center; padding: 0.9rem 1.25rem;
  background: white; border: 1px solid var(--border); border-radius: 10px;
  box-shadow: var(--shadow); position: sticky; bottom: 0.75rem;
}
.actions-spacer { flex: 1; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15,15,15,0.65); z-index: 200;
  display: flex; align-items: center; justify-content: center; padding: 1rem;
  backdrop-filter: blur(4px);
}
.modal {
  background: white; border-radius: 12px; padding: 2rem;
  max-width: 500px; width: 100%; box-shadow: var(--shadow-heavy);
  animation: slideUp 0.2s ease; max-height: 90vh; overflow-y: auto;
}
.modal h3 { font-family: 'DM Serif Display', serif; font-size: 1.35rem; margin-bottom: 1.25rem; }
.modal-actions { display: flex; gap: 0.65rem; justify-content: flex-end; margin-top: 1.25rem; }

/* PREVIEW */
.preview-panel {
  position: fixed; inset: 0; background: rgba(15,15,15,0.88); z-index: 300;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 2rem; overflow-y: auto; backdrop-filter: blur(6px);
}
.preview-container { max-width: 800px; width: 100%; position: relative; }
.preview-controls { display: flex; gap: 0.65rem; margin-bottom: 0.75rem; justify-content: flex-end; }
.preview-doc {
  background: white; padding: 3rem; border-radius: 8px;
  box-shadow: var(--shadow-heavy); font-family: 'Outfit', sans-serif; color: var(--ink);
}
.preview-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:2.5rem; padding-bottom:1.5rem; border-bottom:3px solid var(--ink); }
.preview-logo-block h1 { font-family:'DM Serif Display',serif; font-size:2rem; line-height:1; }
.preview-logo-block h1 span { color:var(--gold); }
.preview-logo-block p { font-size:0.78rem; color:var(--muted); margin-top:0.4rem; line-height:1.7; }
.preview-doc-type { text-align:right; }
.preview-doc-type .type-label { font-family:'DM Serif Display',serif; font-size:1.8rem; font-style:italic; color:var(--muted); }
.preview-doc-type .doc-num { font-family:'DM Mono',monospace; font-size:0.85rem; font-weight:500; }
.preview-parties { display:grid; grid-template-columns:1fr 1fr; gap:2rem; margin-bottom:2rem; }
.preview-party h4 { font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:0.4rem; }
.preview-party .name { font-weight:700; font-size:0.95rem; }
.preview-party p { font-size:0.82rem; color:#444; line-height:1.6; }
.preview-meta { display:flex; gap:1.5rem; flex-wrap:wrap; background:var(--paper); padding:0.9rem 1.25rem; border-radius:8px; margin-bottom:1.75rem; font-size:0.82rem; }
.preview-meta-item { display:flex; flex-direction:column; gap:0.15rem; }
.preview-meta-item .meta-label { font-family:'DM Mono',monospace; font-size:0.58rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); }
.preview-meta-item .meta-value { font-weight:600; }
.preview-table { width:100%; border-collapse:collapse; margin-bottom:1.75rem; }
.preview-table thead tr { background:var(--ink); color:white; }
.preview-table thead th { padding:0.6rem 0.9rem; text-align:left; font-size:0.72rem; font-weight:600; letter-spacing:0.05em; }
.preview-table thead th:last-child { text-align:right; }
.preview-table tbody tr { border-bottom:1px solid var(--border); }
.preview-table tbody td { padding:0.6rem 0.9rem; font-size:0.85rem; }
.preview-table tbody td:last-child { text-align:right; font-family:'DM Mono',monospace; font-weight:500; }
.preview-table tbody td:not(:first-child) { font-family:'DM Mono',monospace; font-size:0.78rem; color:var(--muted); }
.preview-table tbody td:first-child { font-family:'Outfit',sans-serif; }
.preview-totals { display:flex; justify-content:flex-end; margin-bottom:1.75rem; }
.preview-totals-inner { min-width:260px; }
.preview-total-row { display:flex; justify-content:space-between; padding:0.35rem 0; font-size:0.85rem; }
.preview-total-row .lbl { color:var(--muted); }
.preview-total-row .val { font-family:'DM Mono',monospace; }
.preview-total-row.final { border-top:2px solid var(--ink); padding-top:0.7rem; margin-top:0.3rem; }
.preview-total-row.final .lbl { font-weight:700; font-size:0.95rem; }
.preview-total-row.final .val { font-weight:700; font-size:1.05rem; color:var(--gold); }
.preview-notes { font-size:0.78rem; color:var(--muted); line-height:1.7; padding:0.9rem 1.25rem; background:var(--paper); border-radius:6px; margin-bottom:1.75rem; }
.preview-notes strong { color:var(--ink); font-size:0.6rem; text-transform:uppercase; letter-spacing:0.1em; font-family:'DM Mono',monospace; display:block; margin-bottom:0.35rem; }
.preview-footer { border-top:1px solid var(--border); padding-top:0.9rem; text-align:center; font-size:0.72rem; color:var(--muted); font-family:'DM Mono',monospace; }

/* LOADING */
.loader {
  position: fixed; inset: 0; background: var(--ink);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; flex-direction: column; gap: 1rem;
}
.loader-logo { font-family: 'DM Serif Display', serif; font-size: 2.5rem; color: var(--paper); }
.loader-logo span { color: var(--gold); }
.loader-bar { width: 200px; height: 3px; background: #333; border-radius: 2px; overflow: hidden; }
.loader-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; animation: loadfill 1.5s ease forwards; }
@keyframes loadfill { from {width:0} to {width:100%} }

/* TOAST */
.toast {
  position: fixed; bottom: 2rem; right: 2rem;
  background: var(--ink); color: var(--paper);
  padding: 0.75rem 1.1rem; border-radius: 8px;
  font-size: 0.85rem; z-index: 1000;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
  box-shadow: var(--shadow-heavy); display: flex; align-items: center; gap: 0.6rem;
}
@keyframes toastIn { from {transform:translateY(20px);opacity:0} to {transform:translateY(0);opacity:1} }
@keyframes toastOut { to {transform:translateY(20px);opacity:0} }

.count-badge { background:var(--gold); color:var(--ink); font-size:0.58rem; font-weight:700; padding:1px 5px; border-radius:10px; font-family:'DM Mono',monospace; }

/* STATS MINI */
.stats-mini { background:var(--ink); color:var(--paper); border-radius:8px; padding:0.9rem; margin-bottom:0.4rem; }
.stats-mini .stat-label { font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:0.1em; text-transform:uppercase; color:#aaa; margin-bottom:0.25rem; }
.stats-mini .stat-value { font-family:'DM Serif Display',serif; font-size:1.35rem; color:var(--gold); }
.stats-mini .stat-sub { font-family:'DM Mono',monospace; font-size:0.62rem; color:#888; margin-top:0.2rem; }

@media print {
  header, aside, .actions-bar, .preview-controls, #auth-screen { display:none !important; }
  .preview-panel { position:static; background:none; padding:0; }
  .preview-doc { box-shadow:none; border-radius:0; }
}

@media (max-width:768px) {
  .app { grid-template-columns: 1fr; }
  aside { display: none; }
}
</style>
</head>
<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-logo">Freelance<span>Flow</span></div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  <div style="font-size:0.75rem; color:#888; font-family:'DM Mono',monospace;">Chargement…</div>
</div>

<!-- ══════════════════════════════════════════════
     AUTH SCREEN
══════════════════════════════════════════════ -->
<div id="auth-screen" style="display:none;">
  <div class="auth-card">
    <div class="auth-logo">Freelance<span>Flow</span></div>
    <div class="auth-sub">Devis & Factures professionnels — gratuit & en ligne</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Connexion</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Inscription</button>
    </div>

    <div id="auth-error" class="auth-error"></div>
    <div id="auth-info" class="auth-info"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="vous@email.com" autocomplete="email">
    </div>
    <div class="form-group" id="auth-name-group" style="display:none;">
      <label>Nom / Prénom</label>
      <input type="text" id="auth-name" placeholder="Jean Dupont">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')authSubmit()">
    </div>

    <button class="btn btn-primary btn-full" id="auth-btn" onclick="authSubmit()">Se connecter</button>

    <div style="margin-top:1rem; text-align:center; font-size:0.78rem; color:var(--muted);">
      <span id="auth-switch-text">Pas encore de compte ?</span>
      <a href="#" onclick="switchTab(currentTab==='login'?'signup':'login')" style="color:var(--gold); font-weight:600; margin-left:0.3rem;">

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG SUPABASE — REMPLACER PAR VOS VALEURS
// ═══════════════════════════════════════════════════════════════
const SUPABASE_URL  = 'VOTRE_SUPABASE_URL';   // ex: https://abcxyz.supabase.co
const SUPABASE_KEY  = 'VOTRE_SUPABASE_ANON_KEY'; // clé "anon public"

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let state = {
  user: null,
  profile: null,
  docs: [],       // { ...doc, lines: [] }
  currentId: null,
  saving: false
};

let currentTab = 'login';
let saveTimer = null;

// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
const uid  = () => crypto.randomUUID();
const fmt  = n  => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(n||0);
const today = () => new Date().toISOString().split('T')[0];
const addDays = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x.toISOString().split('T')[0]; };
const formatDate = s => s ? new Date(s).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'}) : '—';

function calcLine(l) { return (parseFloat(l.qty)||0) * (parseFloat(l.unit_price)||0); }
function calcTotals(doc) {
  const ht = (doc.lines||[]).reduce((s,l)=>s+calcLine(l),0);
  const rate = parseFloat(doc.tva_rate)||0;
  const tvaAmt = ht*rate/100;
  return { ht, tvaRate:rate, tvaAmt, ttc: ht+tvaAmt };
}

function nextNum(type) {
  const p = state.profile;
  const prefix = type==='devis' ? (p?.prefix_devis||'DEV') : (p?.prefix_facture||'FAC');
  const year   = new Date().getFullYear();
  const count  = state.docs.filter(d=>d.type===type).length;
  return `${prefix}-${year}-${String(count+1).padStart(3,'0')}`;
}

function setSyncState(s) {
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = 'sync-indicator' + (s==='syncing'?' syncing':s==='error'?' error':'');
  dot.title = s==='syncing'?'Synchronisation…':s==='error'?'Erreur de sync':'Synchronisé';
}

function toast(msg,icon='✓') {
  const t=document.createElement('div'); t.className='toast';
  t.innerHTML=`<span>${icon}</span><span>${msg}</span>`;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3100);
}

function currentDoc() { return state.docs.find(d=>d.id===state.currentId); }

// ═══════════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-login').classList.toggle('active',tab==='login');
  document.getElementById('tab-signup').classList.toggle('active',tab==='signup');
  document.getElementById('auth-name-group').style.display = tab==='signup'?'flex':'none';
  document.getElementById('auth-btn').textContent = tab==='login'?'Se connecter':'Créer mon compte';
  document.getElementById('auth-switch-text').textContent = tab==='login'?'Pas encore de compte ?':'Déjà un compte ?';
  document.getElementById('auth-switch-link').textContent = tab==='login'?'S\'inscrire':'Se connecter';
  document.getElementById('auth-error').style.display='none';
  document.getElementById('auth-info').style.display='none';
}

async function authSubmit() {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-password').value;
  const name  = document.getElementById('auth-name').value.trim();
  const errEl = document.getElementById('auth-error');
  const infoEl= document.getElementById('auth-info');
  const btn   = document.getElementById('auth-btn');

  errEl.style.display='none';
  infoEl.style.display='none';

  if (!email||!pass) { showAuthError('Veuillez remplir tous les champs.'); return; }

  btn.disabled=true;
  btn.textContent = currentTab==='login'?'Connexion…':'Inscription…';

  try {
    if (currentTab==='signup') {
      const {data,error} = await db.auth.signUp({email, password:pass, options:{data:{name}}});
      if (error) throw error;
      infoEl.textContent='✉ Vérifiez votre email pour confirmer votre compte.';
      infoEl.style.display='block';
    } else {
      const {data,error} = await db.auth.signInWithPassword({email, password:pass});
      if (error) throw error;
    }
  } catch(e) {
    showAuthError(translateAuthError(e.message));
  } finally {
    btn.disabled=false;
    btn.textContent = currentTab==='login'?'Se connecter':'Créer mon compte';
  }
}

function showAuthError(msg) {
  const el=document.getElementById('auth-error');
  el.textContent='⚠ '+msg; el.style.display='block';
}

function translateAuthError(msg) {
  if (msg.includes('Invalid login')) return 'Email ou mot de passe incorrect.';
  if (msg.includes('Email not confirmed')) return 'Email non confirmé. Vérifiez votre boîte mail.';
  if (msg.includes('already registered')) return 'Cet email est déjà utilisé.';
  if (msg.includes('Password should be')) return 'Mot de passe trop court (6 caractères minimum).';
  return msg;
}

async function signOut() {
  await db.auth.signOut();
  state = {user:null,profile:null,docs:[],currentId:null,saving:false};
  showAuthScreen();
}

// ═══════════════════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════════════════
async function loadAll() {
  setSyncState('syncing');
  try {
    await loadProfile();
    await loadDocs();
    setSyncState('ok');
  } catch(e) {
    console.error(e);
    setSyncState('error');
    toast('Erreur de chargement','⚠');
  }
}

async function loadProfile() {
  const {data,error} = await db.from('profiles').select('*').eq('id',state.user.id).single();
  if (!error && data) state.profile = data;
}

async function loadDocs() {
  const {data:docs,error} = await db.from('documents').select('*').eq('user_id',state.user.id).order('created_at',{ascending:false});
  if (error) throw error;

  const {data:lines,error:le} = await db.from('document_lines').select('*').eq('user_id',state.user.id).order('position',{ascending:true});
  if (le) throw le;

  state.docs = (docs||[]).map(doc => ({
    ...doc,
    lines: (lines||[]).filter(l=>l.document_id===doc.id)
  }));
}

// ═══════════════════════════════════════════════════════════════
// DOCUMENTS CRUD
// ═══════════════════════════════════════════════════════════════
async function newDocument(type='devis') {
  const doc = {
    user_id:       state.user.id,
    type,
    num:           nextNum(type),
    status:        'brouillon',
    date_creation: today(),
    date_echeance: addDays(today(), type==='facture'?(state.profile?.payment_delay||30):30),
    object:        '',
    tva_rate:      state.profile?.tva_rate ?? 20,
    notes:         type==='facture'
      ? `Paiement par virement bancaire.\nIBAN : ${state.profile?.iban||'à compléter'}\nTout retard entraîne des pénalités de retard.`
      : 'Devis valable 30 jours à compter de la date d\'émission.',
    client_name:'', client_email:'', client_phone:'', client_address:'', client_siret:'',
  };

  setSyncState('syncing');
  const {data,error} = await db.from('documents').insert(doc).select().single();
  if (error) { setSyncState('error'); toast('Erreur création','⚠'); return; }

  const defLine = { document_id:data.id, user_id:state.user.id, position:0, is_separator:false, description:'', qty:1, unit:'heure', unit_price:0 };
  const {data:lineData,error:le} = await db.from('document_lines').insert(defLine).select().single();

  const fullDoc = { ...data, lines: lineData ? [lineData] : [] };
  state.docs.unshift(fullDoc);
  state.currentId = fullDoc.id;
  setSyncState('ok');
  renderAll();

  if (!state.profile?.name) setTimeout(()=>{ showSettings(); toast('Renseignez votre profil','👤'); },400);
}

async function deleteDoc(id) {
  if (!confirm('Supprimer ce document définitivement ?')) return;
  setSyncState('syncing');
  await db.from('documents').delete().eq('id',id).eq('user_id',state.user.id);
  state.docs = state.docs.filter(d=>d.id!==id);
  if (state.currentId===id) state.currentId = state.docs.length ? state.docs[0].id : null;
  setSyncState('ok');
  renderAll();
  toast('Document supprimé','🗑');
}

// Auto-save avec debounce
function scheduleSave(docId) {
  clearTimeout(saveTimer);
  setSyncState('syncing');
  saveTimer = setTimeout(()=>saveDoc(docId), 900);
}

async function saveDoc(docId) {
  const doc = state.docs.find(d=>d.id===docId);
  if (!doc) return;

  const {lines,...docData} = doc;
  delete docData.created_at;

  const {error} = await db.from('documents').update({
    ...docData, updated_at: new Date().toISOString()
  }).eq('id',doc.id).eq('user_id',state.user.id);

  if (error) { setSyncState('error'); return; }

  // Resync lines: delete all + reinsert
  await db.from('document_lines').delete().eq('document_id',doc.id).eq('user_id',state.user.id);
  if (lines.length) {
    const linesToInsert = lines.map((l,i) => ({
      id: l.id,
      document_id: doc.id, user_id: state.user.id,
      position: i, is_separator: l.is_separator||false,
      description: l.description||'', qty: l.qty||1,
      unit: l.unit||'heure', unit_price: l.unit_price||0
    }));
    await db.from('document_lines').upsert(linesToInsert);
  }
  setSyncState('ok');
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function renderAll() { renderSidebar(); renderEditor(); }

function renderSidebar() {
  document.getElementById('doc-count').textContent = state.docs.length;

  const paye = state.docs.filter(d=>d.status==='payé');
  const totalPaye = paye.reduce((s,d)=>s+calcTotals(d).ttc,0);
  const pending = state.docs.filter(d=>d.type==='facture'&&!['payé','refusé'].includes(d.status));
  const pendingAmt = pending.reduce((s,d)=>s+calcTotals(d).ttc,0);

  document.getElementById('stats-mini-container').innerHTML = `
    <div class="stats-mini">
      <div class="stat-label">Encaissé</div>
      <div class="stat-value">${fmt(totalPaye)}</div>
      <div class="stat-sub">En attente: ${fmt(pendingAmt)}</div>
    </div>
  `;

  const list = document.getElementById('doc-list');
  if (!state.docs.length) {
    list.innerHTML='<div style="font-size:0.78rem;color:var(--muted);text-align:center;padding:1rem 0;">Aucun document</div>';
    return;
  }

  list.innerHTML = state.docs.map(doc => {
    const t = calcTotals(doc);
    const active = doc.id===state.currentId;
    return `
      <div class="doc-item ${active?'active':''}" onclick="selectDoc('${doc.id}')">
        <span class="doc-type-badge ${active?'':'badge-'+(doc.type)}">${doc.type==='devis'?'DEV':'FAC'}</span>
        <div class="doc-meta">
          <div class="doc-meta-num">${doc.num}</div>
          <div class="doc-meta-client">${doc.client_name||'Client non renseigné'}</div>
        </div>
        <div class="doc-amount">${fmt(t.ttc)}</div>
        <button class="doc-delete" onclick="event.stopPropagation();deleteDoc('${doc.id}')">✕</button>
      </div>
    `;
  }).join('');
}

function renderEditor() {
  const empty  = document.getElementById('empty-state');
  const editor = document.getElementById('editor');

  if (!state.currentId || !currentDoc()) {
    empty.style.display='flex'; editor.style.display='none'; return;
  }

  empty.style.display='none';
  editor.style.display='flex';

  const doc = currentDoc();
  const totals = calcTotals(doc);

  editor.innerHTML = `
    <!-- HEADER DOC -->
    <div class="card">
      <div class="doc-header-bar">
        <div>
          <div style="display:flex;gap:0.5rem;">
            <button class="type-toggle ${doc.type==='devis'?'active-devis':''}" onclick="setType('devis')">📋 Devis</button>
            <button class="type-toggle ${doc.type==='facture'?'active-facture':''}" onclick="setType('facture')">🧾 Facture</button>
          </div>
          <div class="doc-number-display">${doc.num}</div>
        </div>
        <div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:0.5rem;">
          <select class="status-select status-${(doc.status||'brouillon').replace(' ','-')}" onchange="setStatus(this.value)">
            <option value="brouillon" ${doc.status==='brouillon'?'selected':''}>✏ Brouillon</option>
            <option value="envoyé" ${doc.status==='envoyé'?'selected':''}>📤 Envoyé</option>
            <option value="accepté" ${doc.status==='accepté'?'selected':''}>✅ Accepté</option>
            <option value="refusé" ${doc.status==='refusé'?'selected':''}>❌ Refusé</option>
            ${doc.type==='facture'?`
            <option value="payé" ${doc.status==='payé'?'selected':''}>💰 Payé</option>
            <option value="en-retard" ${doc.status==='en-retard'?'selected':''}>⏰ En retard</option>`:''}
          </select>
          <div style="font-size:0.73rem;color:var(--muted);">Total TTC : <span style="font-family:'DM Mono',monospace;font-weight:600;color:var(--gold);">${fmt(totals.ttc)}</span></div>
        </div>
      </div>
    </div>

    <!-- INFOS -->
    <div class="card">
      <div class="card-title">Informations</div>
      <div class="form-grid-3">
        <div class="form-group">
          <label>Date d'émission</label>
          <input type="date" value="${doc.date_creation||today()}" onchange="updateField('date_creation',this.value)">
        </div>
        <div class="form-group">
          <label>${doc.type==='facture'?'Échéance':'Validité'}</label>
          <input type="date" value="${doc.date_echeance||''}" onchange="updateField('date_echeance',this.value)">
        </div>
        <div class="form-group">
          <label>Objet / Mission</label>
          <input type="text" value="${doc.object||''}" placeholder="Ex: Création site web" oninput="updateField('object',this.value)">
        </div>
      </div>
    </div>

    <!-- PARTIES -->
    <div class="card">
      <div class="card-title">Parties</div>
      <div class="parties-grid">
        <div class="party-block">
          <h4>📤 Émetteur (vous)</h4>
          <div style="font-size:0.83rem;color:${state.profile?.name?'var(--ink)':'var(--muted)'};line-height:1.8;">
            ${state.profile?.name
              ? `<strong>${state.profile.name}</strong><br>${(state.profile.address||'').replace(/\n/g,'<br>')}<br>${state.profile.email||''} ${state.profile.phone?'· '+state.profile.phone:''}<br>${state.profile.siret?'SIRET: '+state.profile.siret:''}`
              : `Non renseigné — <a href="#" onclick="showSettings()" style="color:var(--gold)">Configurer le profil</a>`
            }
          </div>
        </div>
        <div class="party-block">
          <h4>📥 Client</h4>
          <div class="form-grid" style="gap:0.55rem;">
            <div class="form-group form-full">
              <label>Nom / Société</label>
              <input type="text" value="${doc.client_name||''}" placeholder="Nom du client" oninput="updateField('client_name',this.value)">
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" value="${doc.client_email||''}" placeholder="client@email.com" oninput="updateField('client_email',this.value)">
            </div>
            <div class="form-group">
              <label>Téléphone</label>
              <input type="text" value="${doc.client_phone||''}" placeholder="06 ..." oninput="updateField('client_phone',this.value)">
            </div>
            <div class="form-group form-full">
              <label>Adresse</label>
              <textarea rows="2" placeholder="Adresse…" oninput="updateField('client_address',this.value)">${doc.client_address||''}</textarea>
            </div>
            <div class="form-group form-full">
              <label>SIRET</label>
              <input type="text" value="${doc.client_siret||''}" placeholder="Optionnel" oninput="updateField('client_siret',this.value)">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- LIGNES -->
    <div class="card">
      <div class="card-title">Prestations</div>
      <div style="overflow-x:auto;">
        <table class="lines-table">
          <thead>
            <tr>
              <th style="width:40%">Description</th>
              <th style="width:10%">Qté</th>
              <th style="width:12%">Unité</th>
              <th style="width:14%">PU HT (€)</th>
              <th style="width:16%;text-align:right">Total HT</th>
              <th style="width:8%"></th>
            </tr>
          </thead>
          <tbody id="lines-body">
            ${(doc.lines||[]).map(renderLine).join('')}
          </tbody>
        </table>
      </div>
      <div style="margin-top:0.9rem;display:flex;gap:0.65rem;align-items:center;">
        <button class="btn btn-outline btn-sm" onclick="addLine()">+ Ligne</button>
        <button class="btn btn-ghost btn-sm" onclick="addLineBlank()">+ Séparateur</button>
        <div style="flex:1;"></div>
        <label style="font-size:0.72rem;color:var(--muted);font-weight:600;">TVA</label>
        <input type="number" value="${doc.tva_rate||0}" min="0" max="100"
          style="width:65px;padding:0.38rem 0.5rem;border:1px solid var(--border);border-radius:6px;font-family:'Outfit',sans-serif;font-size:0.85rem;background:var(--paper);"
          onchange="updateField('tva_rate',parseFloat(this.value)||0);renderEditor();">
        <span style="font-size:0.82rem;color:var(--muted);">%</span>
      </div>

      <div style="margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border);">
        <div class="totals-block">
          <div class="total-row"><span class="total-label">Sous-total HT</span><span class="total-value">${fmt(totals.ht)}</span></div>
          <div class="total-row"><span class="total-label">TVA ${totals.tvaRate}%</span><span class="total-value">${fmt(totals.tvaAmt)}</span></div>
          <div class="total-row separator grand-total"><span class="total-label">Total TTC</span><span class="total-value">${fmt(totals.ttc)}</span></div>
          ${totals.tvaRate===0?'<div style="font-size:0.7rem;color:var(--muted);text-align:right;">TVA non applicable, art. 293 B du CGI</div>':''}
        </div>
      </div>
    </div>

    <!-- NOTES -->
    <div class="card">
      <div class="card-title">Notes & conditions</div>
      <div class="form-group">
        <textarea rows="4" oninput="updateField('notes',this.value)">${doc.notes||''}</textarea>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions-bar">
      <button class="btn btn-outline btn-sm" onclick="duplicateDoc()">📋 Dupliquer</button>
      ${doc.type==='devis'?`<button class="btn btn-outline btn-sm" onclick="convertToFacture()">🧾 → Facture</button>`:''}
      <div class="actions-spacer"></div>
      <button class="btn btn-success" onclick="openPreview()">👁 Aperçu / PDF</button>
    </div>
  `;
}

function renderLine(l) {
  if (l.is_separator) {
    return `<tr>
      <td colspan="5"><input type="text" value="${l.description||''}" placeholder="— Titre de section —" style="font-weight:600;font-size:0.78rem;border:none!important;background:transparent!important;" oninput="updateLineField('${l.id}','description',this.value)"></td>
      <td><button class="line-delete-btn" onclick="deleteLine('${l.id}')">✕</button></td>
    </tr>`;
  }
  return `<tr>
    <td><input type="text" value="${l.description||''}" placeholder="Description de la prestation" oninput="updateLineField('${l.id}','description',this.value)"></td>
    <td><input type="number" value="${l.qty||1}" min="0" step="0.5" style="text-align:center;" oninput="updateLineField('${l.id}','qty',parseFloat(this.value)||0)"></td>
    <td>
      <select style="width:100%;padding:0.35rem 0.3rem;border:1px solid transparent;border-radius:4px;font-family:'Outfit',sans-serif;font-size:0.8rem;background:transparent;cursor:pointer;" onchange="updateLineField('${l.id}','unit',this.value)">
        ${['heure','jour','forfait','unité','mois','semaine'].map(u=>`<option value="${u}" ${l.unit===u?'selected':''}>${u}</option>`).join('')}
      </select>
    </td>
    <td><input type="number" value="${l.unit_price||0}" min="0" step="0.01" style="text-align:right;" oninput="updateLineField('${l.id}','unit_price',parseFloat(this.value)||0)"></td>
    <td class="line-total">${fmt(calcLine(l))}</td>
    <td><button class="line-delete-btn" onclick="deleteLine('${l.id}')">✕</button></td>
  </tr>`;
}

// ═══════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════
function selectDoc(id) { state.currentId=id; renderAll(); }

function setType(type) {
  const doc=currentDoc(); if(!doc)return;
  doc.type=type; doc.num=nextNum(type);
  scheduleSave(doc.id); renderAll();
}

function setStatus(status) {
  const doc=currentDoc(); if(!doc)return;
  doc.status=status; scheduleSave(doc.id);
  renderSidebar(); toast(`Statut: ${status}`);
}

function updateField(field,value) {
  const doc=currentDoc(); if(!doc)return;
  doc[field]=value; scheduleSave(doc.id);
  if(['tva_rate'].includes(field)) renderEditor();
}

function addLine() {
  const doc=currentDoc(); if(!doc)return;
  const l={id:uid(),document_id:doc.id,user_id:state.user.id,position:doc.lines.length,is_separator:false,description:'',qty:1,unit:'heure',unit_price:0};
  doc.lines.push(l); scheduleSave(doc.id); renderEditor();
  setTimeout(()=>{const tb=document.getElementById('lines-body');if(tb){const ins=tb.querySelectorAll('input[type="text"]');if(ins.length)ins[ins.length-1].focus();}},50);
}

function addLineBlank() {
  const doc=currentDoc(); if(!doc)return;
  doc.lines.push({id:uid(),document_id:doc.id,user_id:state.user.id,position:doc.lines.length,is_separator:true,description:''});
  scheduleSave(doc.id); renderEditor();
}

function deleteLine(id) {
  const doc=currentDoc(); if(!doc)return;
  if(doc.lines.length<=1){toast('Au moins une ligne requise','⚠');return;}
  doc.lines=doc.lines.filter(l=>l.id!==id);
  scheduleSave(doc.id); renderEditor();
}

function updateLineField(id,field,value) {
  const doc=currentDoc(); if(!doc)return;
  const line=doc.lines.find(l=>l.id===id); if(!line)return;
  line[field]=value;
  scheduleSave(doc.id);
  // Live update total
  const total=calcLine(line);
  const idx=doc.lines.indexOf(line);
  const cells=document.querySelectorAll('.line-total');
  if(cells[idx])cells[idx].textContent=fmt(total);
  const totals=calcTotals(doc);
  const tvs=document.querySelectorAll('.total-value');
  if(tvs.length>=3){tvs[0].textContent=fmt(totals.ht);tvs[1].textContent=fmt(totals.tvaAmt);tvs[2].textContent=fmt(totals.ttc);}
  const hdTotal=document.querySelector('.doc-header-bar .total-value-display');
  if(hdTotal)hdTotal.textContent=fmt(totals.ttc);
}

async function duplicateDoc() {
  const doc=currentDoc(); if(!doc)return;
  const newDoc={...doc, id:undefined, num:nextNum(doc.type), status:'brouillon', date_creation:today(), created_at:undefined, updated_at:undefined};
  delete newDoc.id; delete newDoc.created_at; delete newDoc.updated_at;
  const lines=[...doc.lines];

  setSyncState('syncing');
  const {data,error}=await db.from('documents').insert(newDoc).select().single();
  if(error){setSyncState('error');toast('Erreur','⚠');return;}

  const linesToInsert=lines.map((l,i)=>({document_id:data.id,user_id:state.user.id,position:i,is_separator:l.is_separator||false,description:l.description||'',qty:l.qty||1,unit:l.unit||'heure',unit_price:l.unit_price||0}));
  const {data:newLines}=await db.from('document_lines').insert(linesToInsert).select();

  state.docs.unshift({...data,lines:newLines||[]});
  state.currentId=data.id;
  setSyncState('ok');
  renderAll(); toast('Dupliqué ✓');
}

async function convertToFacture() {
  const doc=currentDoc(); if(!doc||doc.type!=='devis')return;
  const newDoc={...doc,id:undefined,type:'facture',num:nextNum('facture'),status:'brouillon',date_creation:today(),date_echeance:addDays(today(),state.profile?.payment_delay||30),notes:`Paiement par virement.\nIBAN : ${state.profile?.iban||'à compléter'}\nRéf. devis : ${doc.num}`,created_at:undefined,updated_at:undefined};
  delete newDoc.id; delete newDoc.created_at; delete newDoc.updated_at;

  setSyncState('syncing');
  const {data,error}=await db.from('documents').insert(newDoc).select().single();
  if(error){setSyncState('error');toast('Erreur','⚠');return;}

  const linesToInsert=doc.lines.map((l,i)=>({document_id:data.id,user_id:state.user.id,position:i,is_separator:l.is_separator||false,description:l.description||'',qty:l.qty||1,unit:l.unit||'heure',unit_price:l.unit_price||0}));
  const {data:newLines}=await db.from('document_lines').insert(linesToInsert).select();

  state.docs.unshift({...data,lines:newLines||[]});
  state.currentId=data.id;
  setSyncState('ok');
  renderAll(); toast('Converti en facture ✓','🧾');
}

// ═══════════════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════════════
function showSettings() {
  const p=state.profile||{};
  document.getElementById('s-name').value=p.name||'';
  document.getElementById('s-email').value=p.email||'';
  document.getElementById('s-phone').value=p.phone||'';
  document.getElementById('s-siret').value=p.siret||'';
  document.getElementById('s-tva-intra').value=p.tva_intra||'';
  document.getElementById('s-address').value=p.address||'';
  document.getElementById('s-iban').value=p.iban||'';
  document.getElementById('s-prefix-devis').value=p.prefix_devis||'DEV';
  document.getElementById('s-prefix-facture').value=p.prefix_facture||'FAC';
  document.getElementById('s-tva-rate').value=p.tva_rate??20;
  document.getElementById('s-payment-delay').value=p.payment_delay??30;
  document.getElementById('settings-modal').style.display='flex';
}

function closeSettings() { document.getElementById('settings-modal').style.display='none'; }

async function saveSettings() {
  const prof = {
    id: state.user.id,
    name: document.getElementById('s-name').value,
    email: document.getElementById('s-email').value,
    phone: document.getElementById('s-phone').value,
    siret: document.getElementById('s-siret').value,
    tva_intra: document.getElementById('s-tva-intra').value,
    address: document.getElementById('s-address').value,
    iban: document.getElementById('s-iban').value,
    prefix_devis: document.getElementById('s-prefix-devis').value||'DEV',
    prefix_facture: document.getElementById('s-prefix-facture').value||'FAC',
    tva_rate: parseFloat(document.getElementById('s-tva-rate').value)||20,
    payment_delay: parseInt(document.getElementById('s-payment-delay').value)||30,
    updated_at: new Date().toISOString()
  };
  setSyncState('syncing');
  const {error}=await db.from('profiles').upsert(prof);
  if(error){setSyncState('error');toast('Erreur sauvegarde','⚠');return;}
  state.profile=prof; setSyncState('ok');
  closeSettings(); renderEditor(); toast('Profil sauvegardé','👤');
}

// ═══════════════════════════════════════════════════════════════
// PREVIEW
// ═══════════════════════════════════════════════════════════════
function openPreview() {
  const doc=currentDoc(); if(!doc)return;
  const totals=calcTotals(doc);
  const p=state.profile||{};

  document.getElementById('preview-content').innerHTML = `
    <div class="preview-header">
      <div class="preview-logo-block">
        <h1>Freelance<span>Flow</span></h1>
        ${p.name?`<p><strong style="font-size:1rem;color:#333;">${p.name}</strong></p>`:''}
        ${p.address?`<p>${p.address.replace(/\n/g,'<br>')}</p>`:''}
        ${p.email?`<p>${p.email}${p.phone?' · '+p.phone:''}</p>`:''}
        ${p.siret?`<p>SIRET: ${p.siret}</p>`:''}
        ${p.tva_intra?`<p>TVA: ${p.tva_intra}</p>`:''}
      </div>
      <div class="preview-doc-type">
        <div class="type-label">${doc.type==='devis'?'Devis':'Facture'}</div>
        <div class="doc-num">${doc.num}</div>
      </div>
    </div>
    <div class="preview-parties">
      <div class="preview-party">
        <h4>Émetteur</h4>
        ${p.name?`<p class="name">${p.name}</p>`:'<p style="color:#aaa">—</p>'}
        ${p.address?`<p>${p.address.replace(/\n/g,'<br>')}</p>`:''}
      </div>
      <div class="preview-party">
        <h4>Destinataire</h4>
        ${doc.client_name?`<p class="name">${doc.client_name}</p>`:'<p style="color:#aaa">—</p>'}
        ${doc.client_address?`<p>${doc.client_address.replace(/\n/g,'<br>')}</p>`:''}
        ${doc.client_email?`<p>${doc.client_email}${doc.client_phone?' · '+doc.client_phone:''}</p>`:''}
        ${doc.client_siret?`<p>SIRET: ${doc.client_siret}</p>`:''}
      </div>
    </div>
    <div class="preview-meta">
      <div class="preview-meta-item"><span class="meta-label">Émission</span><span class="meta-value">${formatDate(doc.date_creation)}</span></div>
      <div class="preview-meta-item"><span class="meta-label">${doc.type==='facture'?'Échéance':'Validité'}</span><span class="meta-value">${formatDate(doc.date_echeance)}</span></div>
      ${doc.object?`<div class="preview-meta-item"><span class="meta-label">Objet</span><span class="meta-value">${doc.object}</span></div>`:''}
      <div class="preview-meta-item"><span class="meta-label">Statut</span><span class="meta-value" style="text-transform:capitalize;">${doc.status}</span></div>
    </div>
    <table class="preview-table">
      <thead><tr><th style="width:50%">Description</th><th>Quantité</th><th>PU HT</th><th style="text-align:right">Total HT</th></tr></thead>
      <tbody>
        ${(doc.lines||[]).map(l=>{
          if(l.is_separator) return `<tr><td colspan="4" style="padding:0.5rem 0.9rem;font-weight:700;font-size:0.78rem;background:#f9f9f9;color:#666;">${l.description||'—'}</td></tr>`;
          return `<tr><td>${l.description||'—'}</td><td>${l.qty} ${l.unit}</td><td>${fmt(l.unit_price||0)}</td><td>${fmt(calcLine(l))}</td></tr>`;
        }).join('')}
      </tbody>
    </table>
    <div class="preview-totals">
      <div class="preview-totals-inner">
        <div class="preview-total-row"><span class="lbl">Sous-total HT</span><span class="val">${fmt(totals.ht)}</span></div>
        <div class="preview-total-row"><span class="lbl">TVA ${totals.tvaRate}%</span><span class="val">${fmt(totals.tvaAmt)}</span></div>
        <div class="preview-total-row final"><span class="lbl">Total TTC</span><span class="val">${fmt(totals.ttc)}</span></div>
        ${totals.tvaRate===0?'<div style="font-size:0.68rem;color:#aaa;text-align:right;margin-top:0.3rem;">TVA non applicable, art. 293 B du CGI</div>':''}
      </div>
    </div>
    ${doc.notes?`<div class="preview-notes"><strong>Notes & conditions</strong>${doc.notes.replace(/\n/g,'<br>')}</div>`:''}
    <div class="preview-footer">${p.name||'FreelanceFlow'} ${p.siret?' · SIRET '+p.siret:''} ${p.tva_intra?' · TVA '+p.tva_intra:''}</div>
  `;
  document.getElementById('preview-panel').style.display='flex';
}

function closePreview() { document.getElementById('preview-panel').style.display='none'; }

// ═══════════════════════════════════════════════════════════════
// SCREEN SWITCHING
// ═══════════════════════════════════════════════════════════════
function showAuthScreen() {
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app-screen').style.display='none';
}

function showAppScreen() {
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  document.getElementById('user-email-display').textContent=state.user.email;
}

// ═══════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='p'){e.preventDefault();openPreview();}
  if(e.key==='Escape'){closePreview();closeSettings();}
});

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
async function init() {
  // Auth state listener
  db.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      state.user = session.user;
      await loadAll();
      showAppScreen();
      renderAll();
    } else {
      showAuthScreen();
    }
    document.getElementById('loader').style.display='none';
  });

  // Check existing session
  const {data:{session}} = await db.auth.getSession();
  if (!session) {
    document.getElementById('loader').style.display='none';
    showAuthScreen();
  }
}

init();
</script>
